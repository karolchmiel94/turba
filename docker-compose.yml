# Chain nodes for turba load simulation. EVM_BLOCK_TIME is set by simulate.py
# based on the selected profile before containers start.

services:
  bitcoind:
    image: lncm/bitcoind:v27.0
    command:
      - -regtest=1
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=omni
      - -rpcpassword=omni
      - -fallbackfee=0.0002
    ports:
      - "18443:18443"

  ethereum:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
      - "--chain-id"
      - "31337"
      - "--block-time"
      - "${EVM_BLOCK_TIME:-0}"
    ports:
      - "8545:8545"

  base:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8546"
      - "--chain-id"
      - "8453"
      - "--block-time"
      - "${EVM_BLOCK_TIME:-0}"
    ports:
      - "8546:8546"

  solana:
    image: solanalabs/solana:stable
    command:
      - "solana-test-validator"
      - "--rpc-port"
      - "8899"
      - "--bind-address"
      - "0.0.0.0"
    ports:
      - "8899:8899"
      - "8900:8900"

  tron:
    image: trontools/quickstart:latest
    ports:
      - "9090:9090"
    environment:
      - defaultBalance=100000
